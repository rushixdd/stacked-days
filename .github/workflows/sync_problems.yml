name: Solve Analytics Sync

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  update_metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Calculate Solved Problems
        id: calc
        run: |
          COUNT=$(find ProblemSolvingCSharp -type f \( -name "*.cs" -o -name "*.cpp" -o -name "*.py" -o -name "*.java" \) | wc -l)
          echo "TOTAL_SOLVED=$COUNT" >> $GITHUB_ENV

      - name: Sync to Portfolio
        shell: pwsh
        run: |
          $loginBody = @{ username = "${{ secrets.PORTFOLIO_USERNAME }}"; password = "${{ secrets.PORTFOLIO_PASSWORD }}" } | ConvertTo-Json
          $authResponse = Invoke-RestMethod -Method Post -Uri "https://rushixdd.duckdns.org/api/auth/login" -ContentType "application/json" -Body $loginBody
          
          # 4. PARTIAL SYNC (Only sends problemsSolved)
          $patchPayload = @{ problemsSolved = [int]${{ env.TOTAL_SOLVED }} } | ConvertTo-Json

          Invoke-RestMethod -Method Patch `
              -Uri "https://rushixdd.duckdns.org/api/telemetry/sync" `
              -Headers @{ "Authorization" = "Bearer $($authResponse.token)" } `
              -ContentType "application/json" `
              -Body $patchPayload