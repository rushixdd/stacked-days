name: Solve Analytics Sync

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  update_metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Calculate Solved Problems
        id: calc
        run: |
          COUNT=$(find ProblemSolvingCSharp -type f \( -name "*.cs" -o -name "*.cpp" -o -name "*.py" -o -name "*.java" \) | wc -l)
          echo "TOTAL_SOLVED=$COUNT" >> $GITHUB_ENV

      - name: Sync to Portfolio
        shell: pwsh
        run: |
          $patchPayload = @{ problemsSolved = [int]${{ env.TOTAL_SOLVED }} } | ConvertTo-Json -Compress

          Invoke-RestMethod -Method Patch `
              -Uri "https://rushixdd.duckdns.org/api/telemetry/sync" `
              -Headers @{ "X-Sync-Api-Key" = "${{ secrets.SYNC_API_KEY }}" } `
              -ContentType "application/json" `
              -Body $patchPayload